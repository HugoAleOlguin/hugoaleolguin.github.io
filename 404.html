<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | HugoAleOlguin</title>
    <link rel="icon" href="favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #0d1117 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 700;
            background: linear-gradient(135deg, #00f3ff 0%, #ff00ff 50%, #00f3ff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            line-height: 1;
            margin-bottom: 1rem;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .error-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #00f3ff;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .error-message {
            color: #666;
            font-size: 1rem;
            margin-bottom: 2rem;
            max-width: 400px;
        }

        .btn-home {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #00f3ff, #00a8b3);
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.3);
        }

        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00ff;
            animation: glitch1 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: 2px 0 #00f3ff;
            animation: glitch2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch1 {

            0%,
            100% {
                clip-path: inset(0 0 95% 0);
            }

            20% {
                clip-path: inset(20% 0 60% 0);
            }

            40% {
                clip-path: inset(60% 0 10% 0);
            }

            60% {
                clip-path: inset(40% 0 40% 0);
            }

            80% {
                clip-path: inset(80% 0 5% 0);
            }
        }

        @keyframes glitch2 {

            0%,
            100% {
                clip-path: inset(95% 0 0 0);
            }

            20% {
                clip-path: inset(10% 0 70% 0);
            }

            40% {
                clip-path: inset(50% 0 30% 0);
            }

            60% {
                clip-path: inset(30% 0 50% 0);
            }

            80% {
                clip-path: inset(5% 0 80% 0);
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="error-code glitch">404</div>
        <h1 class="error-title">Página no encontrada</h1>
        <p class="error-message">
            Hmm algo se rompió...
            Mejor volvé a mi portfolio.
        </p>
        <a href="/hugoaleolguin.github.io/" class="btn-home">Volver al Portfolio</a>
    </div>

    <script>
        // Crear partículas flotantes
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (5 + Math.random() * 5) + 's';
            container.appendChild(particle);
        }
    </script>
</body>

</html>
